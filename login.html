<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Meta Tags -->
    <title>Login - AIAutomate | Sign In to Your Account</title>
    <meta name="description" content="Sign in to your AIAutomate account to manage your automation workflows and access your dashboard.">
    <meta name="robots" content="noindex, follow">
    
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <!-- Login Section -->
    <section class="login-section">
        <div class="login-container">
            <div class="login-card" data-aos="fade-up">
                <div class="login-logo">
                    <div class="login-logo-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10H12V2z"></path><path d="M12 2v10h10"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </div>
                    <h4 style="font-weight: 700; margin-bottom: 0.25rem;"><span class="brand-text">AI</span>Automate</h4>
                    <p style="color: var(--text-muted); font-size: 0.875rem; margin: 0;">Welcome Back!</p>
                </div>

                <form>
                    <div class="mb-3">
                        <label for="login-email" style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 0.5rem; display: block;">Email Address</label>
                        <input type="email" id="login-email" class="form-control form-control-dark" placeholder="name@company.com" aria-label="Email Address">
                    </div>
                    <div class="mb-3">
                        <label for="login-password" style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 0.5rem; display: block;">Password</label>
                        <input type="password" id="login-password" class="form-control form-control-dark" placeholder="Enter your password" aria-label="Password">
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="remember" style="background: var(--bg-secondary); border-color: var(--border-color);">
                            <label class="form-check-label" for="remember" style="color: var(--text-secondary); font-size: 0.875rem;">Remember me</label>
                        </div>
                        <a href="#" style="color: var(--primary-color); font-size: 0.875rem; text-decoration: none;">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary-gradient w-100" style="padding: 0.75rem;">Login</button>
                </form>

                <div class="login-divider">or continue with</div>

                <div class="social-login">
                    <button class="btn-social">
                        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                        Google
                    </button>
                    <button class="btn-social">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                        GitHub
                    </button>
                </div>

                <p class="text-center mb-0" style="color: var(--text-muted); font-size: 0.875rem;">
                    Don't have an account? <a href="pricing.html" style="color: var(--primary-color); text-decoration: none;">Sign up</a>
                </p>
            </div>

            <p class="text-center mt-4" style="color: var(--text-muted); font-size: 0.875rem;">
                &copy; 2024 AIAutomate. All rights reserved.
            </p>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/theme.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
